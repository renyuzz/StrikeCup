<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全倒盃 STRIKE CUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .font-sport {
            font-family: 'Black Ops One', cursive;
        }

        :root {
            --name-w: 65px;   
            --total-w: 50px;  
        }

        .table-container {
            display: grid;
            grid-template-columns: var(--name-w) 1fr var(--total-w);
            overflow: hidden;
            width: 100%;
            border-top: 1px solid #1e293b;
            border-bottom: 1px solid #1e293b;
        }

        .side-col {
            background-color: #1e293b;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .side-col-left { border-right: 1px solid #334155; }
        .side-col-right {
            border-left: 1px solid #334155;
            background-color: rgba(30, 41, 59, 0.9);
        }

        .grid-area {
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
        }

        .row-h {
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1e293b;
        }

        .header-h {
            height: 35px;
            font-size: 9px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 900;
            background-color: #0f172a;
        }

        .strike-cell {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(30, 41, 59, 0.5);
            cursor: pointer;
            transition: all 0.1s;
            min-width: 0;
        }

        .strike-cell.active {
            background-color: #ef4444 !important;
            color: white !important;
        }

        .card-winner {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        .name-text {
            font-size: 11px;
            font-weight: 900;
            padding: 0 2px;
            text-align: center;
            width: 100%;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <header class="p-4 pt-8 text-center bg-slate-900 rounded-b-[2rem] shadow-2xl border-b-2 border-red-500">
            <h1 class="text-4xl font-sport text-red-500 italic tracking-tighter drop-shadow-md">STRIKE CUP</h1>
            <div class="mt-1 text-slate-400 text-[10px] font-bold tracking-widest uppercase">全倒盃</div>
            
            <div class="flex justify-center gap-1.5 mt-4">
                <div class="bg-slate-800 px-2 py-1.5 rounded-lg border border-slate-700 text-[8px]">
                    <div class="text-slate-500">1-6人</div>
                    <div class="text-blue-400 font-black">取 1</div>
                </div>
                <div class="bg-slate-800 px-2 py-1.5 rounded-lg border border-slate-700 text-[8px]">
                    <div class="text-slate-500">7-11人</div>
                    <div class="text-green-400 font-black">取 1-2</div>
                </div>
                <div class="bg-slate-800 px-2 py-1.5 rounded-lg border border-slate-700 text-[8px]">
                    <div class="text-slate-500">12人+</div>
                    <div class="text-purple-400 font-black">取 1-3</div>
                </div>
            </div>
        </header>

        <!-- 輸入區域 -->
        <section class="p-4 mt-2 space-y-3">
            <div class="flex flex-col gap-2">
                <!-- 新增玩家區域 -->
                <div class="flex gap-2 items-center">
                    <div class="flex-1 bg-slate-800 p-1.5 rounded-xl border border-slate-700 shadow-inner">
                        <input id="player-name" type="text" placeholder="輸入玩家姓名..." 
                            onkeydown="if(event.key==='Enter') addPlayer()"
                            class="bg-transparent w-full px-3 py-2 text-white outline-none font-bold text-sm">
                    </div>
                    <button onclick="addPlayer()" 
                        class="bg-red-600 hover:bg-red-500 text-white px-5 h-12 rounded-xl font-black text-sm active:scale-95 transition shadow-lg shrink-0">
                        新增玩家
                    </button>
                </div>

                <div class="flex items-center gap-2 bg-slate-800/50 p-2 rounded-xl border border-slate-700/50">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2">每格費用 $</label>
                    <input id="stake-amount" type="number" value="20" onchange="calculateAndRender()"
                        class="bg-slate-900 w-20 px-3 py-1 rounded-lg text-red-400 font-sport text-center border border-slate-700 focus:border-red-500 outline-none">
                </div>
            </div>
            
            <!-- 玩家標籤 (點擊 X 可移除) -->
            <div id="player-tags" class="flex flex-wrap gap-2 px-1"></div>
        </section>

        <!-- 紀錄表格 -->
        <section class="mt-2">
            <div class="table-container">
                <!-- 左欄：姓名 -->
                <div class="side-col side-col-left">
                    <div class="header-h flex items-center justify-center border-b border-slate-800">姓名</div>
                    <div id="name-col-body"></div>
                </div>

                <!-- 中欄：1-10格 -->
                <div class="grid-area">
                    <div id="frame-header" class="header-h flex w-full"></div>
                    <div id="grid-col-body"></div>
                </div>

                <!-- 右欄：總計 -->
                <div class="side-col side-col-right">
                    <div class="header-h flex items-center justify-center border-b border-slate-800 text-red-500 font-black">全倒</div>
                    <div id="total-col-body"></div>
                </div>
            </div>
            <div class="p-2 text-center text-[9px] text-slate-600 font-bold bg-slate-950/30 italic">
                TIPS: 點擊格子紀錄全倒 X · 每人每格 $ <span id="display-stake">20</span>
            </div>
        </section>

        <!-- 結算彙整 -->
        <section class="p-4 mt-1">
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 class="text-xl font-black italic text-slate-200 tracking-tight underline decoration-red-500 decoration-2 underline-offset-4">輸贏總額</h2>
                <div class="flex gap-2">
                    <button onclick="resetScores()" class="px-3 py-1.5 bg-slate-800 text-red-500 text-[9px] font-black rounded-lg border border-red-900/30 active:bg-red-900/50 transition shadow-sm">
                        清空 X
                    </button>
                    <button onclick="clearPlayers()" class="px-3 py-1.5 bg-slate-800 text-slate-400 text-[9px] font-black rounded-lg border border-slate-700 active:bg-slate-700 transition shadow-sm">
                        重置名單
                    </button>
                </div>
            </div>
            <div id="summary-list" class="space-y-3"></div>
        </section>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white px-8 py-4 rounded-2xl opacity-0 pointer-events-none transition-all z-50 font-bold shadow-2xl"></div>

    <script>
        let players = [];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();
            if (!name) return;
            if (players.find(p => p.name === name)) {
                showToast('❌ 姓名重複');
                return;
            }
            players.push({
                name: name,
                strikes: Array(10).fill(false),
                winLoss: 0
            });
            input.value = '';
            calculateAndRender();
        }

        function removePlayer(index) {
            if(confirm(`移除玩家「${players[index].name}」？`)) {
                players.splice(index, 1);
                calculateAndRender();
            }
        }

        function clearPlayers() {
            if(confirm(`確定要清空所有玩家名單嗎？`)) {
                players = [];
                calculateAndRender();
            }
        }

        function toggleStrike(pIdx, fIdx) {
            players[pIdx].strikes[fIdx] = !players[pIdx].strikes[fIdx];
            calculateAndRender();
        }

        function resetScores() {
            if(!confirm("確定要清空所有全倒紀錄嗎？")) return;
            players.forEach(p => p.strikes = Array(10).fill(false));
            calculateAndRender();
        }

        function calculateAndRender() {
            const stakeInput = document.getElementById('stake-amount');
            const currentStake = parseInt(stakeInput.value) || 0;
            document.getElementById('display-stake').innerText = currentStake;

            players.forEach(p => p.winLoss = 0);
            const pCount = players.length;

            if (pCount > 0) {
                for (let f = 0; f < 10; f++) {
                    const strikers = [];
                    const losers = [];
                    players.forEach((p, idx) => {
                        if (p.strikes[f]) strikers.push(idx);
                        else losers.push(idx);
                    });

                    const sCount = strikers.length;
                    let isConditionMet = false;

                    // 調整後的人數分配邏輯
                    if (pCount <= 6 && sCount === 1) {
                        isConditionMet = true;
                    } else if (pCount >= 7 && pCount <= 11 && (sCount >= 1 && sCount <= 2)) {
                        isConditionMet = true;
                    } else if (pCount >= 12 && (sCount >= 1 && sCount <= 3)) {
                        isConditionMet = true;
                    }

                    if (isConditionMet) {
                        const totalPool = losers.length * currentStake;
                        const winPerPerson = totalPool / sCount;
                        strikers.forEach(idx => players[idx].winLoss += winPerPerson);
                        losers.forEach(idx => players[idx].winLoss -= currentStake);
                    }
                }
            }
            render();
        }

        function render() {
            // 1. 玩家標籤
            document.getElementById('player-tags').innerHTML = players.map((p, i) => `
                <div class="flex items-center bg-slate-800 border border-slate-700 px-2 py-1 rounded-lg text-[11px] font-bold shadow-sm animate-in fade-in zoom-in duration-200">
                    <span class="text-slate-300">${p.name}</span>
                    <button onclick="removePlayer(${i})" class="ml-2 text-red-500 font-black w-5 h-5 flex items-center justify-center bg-slate-900 rounded-full hover:bg-red-900 transition">×</button>
                </div>
            `).join('');

            // 2. 中欄標頭 (1-10 數字)
            document.getElementById('frame-header').innerHTML = Array.from({length: 10}, (_, i) => `
                <div class="flex-1 flex items-center justify-center border-r border-slate-800/30 font-black">${i+1}</div>
            `).join('');

            // 3. 左欄：姓名
            document.getElementById('name-col-body').innerHTML = players.map(p => `
                <div class="row-h border-slate-800/50">
                    <span class="name-text truncate">${p.name}</span>
                </div>
            `).join('');

            // 4. 中欄：1-10格
            document.getElementById('grid-col-body').innerHTML = players.map((p, pIdx) => `
                <div class="row-h flex border-slate-800/50">
                    ${p.strikes.map((s, fIdx) => `
                        <div onclick="toggleStrike(${pIdx}, ${fIdx})" 
                            class="strike-cell h-full ${s ? 'active' : ''}">
                            <span class="font-sport text-sm ${s ? 'text-white' : 'text-slate-800'}">${s ? 'X' : '·'}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            // 5. 右欄：總計
            document.getElementById('total-col-body').innerHTML = players.map(p => `
                <div class="row-h font-sport text-md text-red-500 border-slate-800/50">${p.strikes.filter(s => s).length}</div>
            `).join('');

            // 6. 結算卡片
            const summaryContainer = document.getElementById('summary-list');
            if (players.length === 0) {
                summaryContainer.innerHTML = '<div class="text-center py-8 text-slate-700 font-bold text-[10px]">請先新增玩家名單</div>';
                return;
            }

            summaryContainer.innerHTML = players.map(p => {
                const isWinner = p.winLoss > 0;
                const isLoser = p.winLoss < 0;
                const amount = Math.round(p.winLoss);
                return `
                    <div class="p-4 rounded-3xl flex justify-between items-center transition-all ${isWinner ? 'card-winner text-white scale-[1.02]' : 'bg-slate-800/50 border border-slate-700'}">
                        <div>
                            <div class="text-xl font-black italic tracking-tight">${p.name}</div>
                            <div class="${isWinner ? 'text-red-200' : 'text-slate-500'} text-[9px] font-bold mt-1 uppercase">
                                Strikes: ${p.strikes.filter(s => s).length} / 10
                            </div>
                        </div>
                        <div class="text-2xl font-sport ${isWinner ? 'text-white' : isLoser ? 'text-red-500' : 'text-slate-600'}">
                            ${amount > 0 ? '+' : ''}${amount}
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
